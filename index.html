<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rutina Alonso</title>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF7043">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;overflow-x:hidden}
#pin-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:28px}
#pin-screen h2{color:white;font-size:22px;font-weight:600}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);transition:all .2s}
.pin-dot.filled{background:#FF7043;border-color:#FF7043}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{background:rgba(255,255,255,0.1);border:none;border-radius:16px;color:white;font-size:24px;font-weight:500;padding:18px;cursor:pointer}
.pin-btn:active{background:rgba(255,255,255,0.25)}
.pin-error{color:#FF7043;font-size:14px;opacity:0;transition:opacity .3s}
.pin-error.show{opacity:1}
#splash{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-end;z-index:1000;padding-bottom:56px;background:#0a0a1a}
#splash-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
#splash-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 30%,rgba(5,5,20,0.88) 100%)}
.sc{position:relative;text-align:center;color:white;display:flex;flex-direction:column;align-items:center;gap:6px}
.sc h1{font-size:30px;font-weight:700;text-shadow:0 2px 16px rgba(0,0,0,0.9)}
.sc p{font-size:15px;opacity:0.82}
.ebtn{margin-top:24px;background:#FF7043;color:white;border:none;border-radius:28px;padding:15px 52px;font-size:18px;font-weight:700;cursor:pointer}
#app{display:none;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.ah{padding:18px 20px 0;color:white;transition:background .3s}
.ah h1{font-size:21px;font-weight:700}
.ah .sub{font-size:12px;opacity:0.85;margin-top:3px}
.dt{display:flex;gap:5px;padding:10px 12px 12px;transition:background .3s;overflow-x:auto}
.dt::-webkit-scrollbar{display:none}
.dt button{flex:1;min-width:44px;text-align:center;padding:7px 2px;border-radius:20px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.72);background:rgba(255,255,255,0.16);cursor:pointer;border:none}
.dt button.active{background:white;color:#FF7043}
.dt button.active.fds{color:#1565C0!important}
.dt button.fds:not(.active){background:rgba(255,255,255,0.32);font-weight:700}
.bnav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:white;border-top:0.5px solid #e8e8e0;display:flex;z-index:100}
.bnav button{flex:1;padding:10px 4px 14px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;color:#aaa}
.bnav button.active{color:#FF7043}
.bnav button span{font-size:22px}
.ct{padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.pc{background:white;border-radius:13px;padding:12px 15px;display:flex;align-items:center;gap:10px;border:0.5px solid #e8e8e0}
.pl{font-size:12px;color:#999;white-space:nowrap;flex:1}
.pb{flex:2;height:7px;background:#f0ede8;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s ease}
.pf.semana{background:#FF7043}.pf.fds{background:#1976D2}
.pp{font-size:13px;font-weight:700;white-space:nowrap;min-width:38px;text-align:right}
.pp.semana{color:#FF7043}.pp.fds{color:#1976D2}
.tl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding-left:4px;margin-top:2px}
.tl.semana{color:#FF7043}.tl.fds{color:#1976D2}
.tr{display:flex;align-items:center;gap:11px;background:white;border-radius:13px;padding:11px 13px;border:0.5px solid #e8e8e0;cursor:pointer;transition:transform .1s}
.tr:active{transform:scale(0.98)}
.tr.done{background:#fafaf7;opacity:0.55}
.te{font-size:23px;width:30px;text-align:center;flex-shrink:0}
.ti{flex:1;min-width:0}
.tn{font-size:14px;font-weight:500;color:#2c2c2a;line-height:1.3}
.tn.done{text-decoration:line-through;color:#bbb}
.tt{font-size:11px;color:#bbb;margin-top:2px}
.tc{width:25px;height:25px;border-radius:7px;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tc.done{border:none}
.tc.semana.done{background:#FF7043}.tc.fds.done{background:#1976D2}
.tc.done::after{content:'';width:8px;height:5px;border-left:2.5px solid white;border-bottom:2.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block}
.pts-pill{font-size:10px;font-weight:700;color:#7B1FA2;background:#f3e5f5;border-radius:8px;padding:2px 6px;margin-left:6px;flex-shrink:0}

/* PUNTOS SCREEN */
#puntos-screen{display:none;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.pts-hdr{background:#7B1FA2;padding:18px 20px 20px;color:white}
.pts-hdr h1{font-size:21px;font-weight:700}
.pts-hdr .sub{font-size:12px;opacity:0.85;margin-top:3px}
.pts-total-card{margin:16px;background:white;border-radius:16px;padding:24px;text-align:center;border:0.5px solid #e8e8e0;box-shadow:0 2px 12px rgba(123,31,162,0.08)}
.pts-num{font-size:64px;font-weight:800;color:#7B1FA2;line-height:1}
.pts-lbl{font-size:13px;color:#999;margin-top:8px}
.pts-week-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7B1FA2;padding:4px 16px 8px}
.pts-day-row{margin:0 16px 8px;background:white;border-radius:13px;padding:12px 16px;display:flex;align-items:center;gap:12px;border:0.5px solid #e8e8e0}
.pts-day-name{font-size:13px;font-weight:600;color:#2c2c2a;width:36px;flex-shrink:0}
.pts-day-bar-bg{flex:1;height:8px;background:#f0ede8;border-radius:4px;overflow:hidden}
.pts-day-bar-fill{height:100%;background:#7B1FA2;border-radius:4px;transition:width .5s ease}
.pts-day-num{font-size:14px;font-weight:700;color:#7B1FA2;min-width:32px;text-align:right}

/* CELEBRATION */
#celebration{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:3000;flex-direction:column;align-items:center;justify-content:center}
#celebration.show{display:flex}
.cel-box{background:white;border-radius:24px;padding:32px 28px;text-align:center;max-width:300px;animation:popIn .4s ease}
.cel-emoji{font-size:64px;display:block;animation:bounce .5s infinite alternate}
.cel-title{font-size:24px;font-weight:800;color:#2c2c2a;margin-top:12px}
.cel-sub{font-size:14px;color:#888;margin-top:6px}
.cel-pts{font-size:40px;font-weight:800;color:#FF7043;margin-top:8px}
.cel-btn{margin-top:20px;background:#FF7043;color:white;border:none;border-radius:20px;padding:13px 40px;font-size:16px;font-weight:700;cursor:pointer}
@keyframes bounce{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.15) rotate(5deg)}}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}

/* MODAL */
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.48);z-index:600;align-items:flex-end;justify-content:center}
.mb.open{display:flex}
.md{background:white;border-radius:22px 22px 0 0;padding:26px 20px 40px;width:100%;max-width:430px}
.md h3{font-size:17px;font-weight:700;margin-bottom:20px;color:#2c2c2a}
.md label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#999;display:block;margin-bottom:6px}
.md input,.md select{width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid #e8e8e0;font-size:15px;margin-bottom:16px;outline:none;color:#2c2c2a;background:white}
.md input:focus,.md select:focus{border-color:#FF7043}
.mdb{display:flex;gap:10px;margin-top:6px}
.bc{flex:1;padding:14px;border-radius:13px;border:1.5px solid #e8e8e0;background:white;font-size:15px;font-weight:500;color:#999;cursor:pointer}
.bo{flex:2;padding:14px;border-radius:13px;border:none;background:#FF7043;color:white;font-size:15px;font-weight:700;cursor:pointer}
.loading{text-align:center;padding:48px 20px;color:#bbb;font-size:14px}
.err{background:#fff0ed;border:1px solid #ffccbc;border-radius:12px;padding:14px;font-size:13px;color:#bf360c;text-align:center;line-height:1.6}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:#2c2c2a;color:white;padding:11px 22px;border-radius:22px;font-size:13px;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="pin-screen">
  <h2>🔐 Introduce el PIN</h2>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('0')" style="grid-column:2">0</button>
    <button class="pin-btn" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error">PIN incorrecto, inténtalo de nuevo</div>
</div>

<div id="splash">
  <img id="splash-img" src="https://i.imgur.com/bBfQCIJ.png" alt="Alonso" onerror="this.style.display='none'">
  <div id="splash-ov"></div>
  <div class="sc">
    <h1>Rutina Semanal</h1>
    <p id="splash-sub">¡Hola Alonso! 💪</p>
    <button class="ebtn" onclick="enterApp()">¡Vamos! →</button>
  </div>
</div>

<div id="app">
  <div class="ah" id="app-header">
    <h1>📋 Mi Rutina</h1>
    <div class="sub" id="hdr-date"></div>
  </div>
  <div class="dt" id="day-tabs"></div>
  <div class="ct" id="content"><div class="loading">Cargando... ⏳</div></div>
</div>

<div id="puntos-screen">
  <div class="pts-hdr">
    <h1>⭐ Mis Puntos</h1>
    <div class="sub" id="pts-semana-lbl">Esta semana</div>
  </div>
  <div class="pts-total-card">
    <div class="pts-num" id="pts-total">0</div>
    <div class="pts-lbl">puntos esta semana 🏆</div>
  </div>
  <div class="pts-week-title">Puntos por día</div>
  <div id="pts-dias"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav" id="bnav" style="display:none">
  <button class="active" id="nav-rutina" onclick="showScreen('rutina')">
    <span>📋</span>Rutina
  </button>
  <button id="nav-puntos" onclick="showScreen('puntos')">
    <span>⭐</span>Puntos
  </button>
</div>

<!-- CELEBRATION -->
<div id="celebration">
  <div class="cel-box">
    <span class="cel-emoji" id="cel-emoji">🏆</span>
    <div class="cel-title" id="cel-title">¡Día completado!</div>
    <div class="cel-sub" id="cel-sub">¡Has completado todas las tareas!</div>
    <div class="cel-pts" id="cel-pts"></div>
    <button class="cel-btn" onclick="closeCelebration()">¡Genial! 🎉</button>
  </div>
</div>

<div class="mb" id="modal-bg">
  <div class="md">
    <h3>📚 ¿Qué estudiaste hoy?</h3>
    <label>Materia</label>
    <input type="text" id="m-mat" placeholder="Ej: Matemáticas, Historia...">
    <label>Minutos estudiados</label>
    <input type="number" id="m-min" placeholder="Ej: 30" min="1" max="180">
    <label>¿Con quién?</label>
    <select id="m-quien">
      <option value="solo">Solo</option>
      <option value="papá">Con papá</option>
      <option value="mamá">Con mamá</option>
      <option value="papá y mamá">Con papá y mamá</option>
    </select>
    <div class="mdb">
      <button class="bc" onclick="closeModal()">Cancelar</button>
      <button class="bo" onclick="confirmEstudio()">✓ Listo</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const SHEET_ID='1LSsMaLYIuzs1RpVmp3nVS9BzKhVJi6FQEL4swmQaVfs';
const SURL='https://script.google.com/macros/s/AKfycbycIgLWF8ntqcuvqQb8dJtEFuR6CEDZ_ocDMy5mxBV7daNciO4Z6NAbRlnTDXLXTCTSkg/exec';
const PIN_OK='1714';
const DIAS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const FDS=['Sábado','Domingo'];
const TURNOS=['mañana','tarde','noche'];
const TICOS={mañana:'☀️ Mañana',tarde:'🌤 Tarde',noche:'🌙 Noche'};

let rutina=[],completados=new Set(),puntosData={},diaActivo='',pendingTask=null,todayStr='';

// Audio context
let audioCtx=null;
function getAudio(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playCheck(){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(523,ctx.currentTime);
    o.frequency.setValueAtTime(659,ctx.currentTime+0.1);
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start();o.stop(ctx.currentTime+0.3);
  }catch(e){}
}

function playCelebration(){
  try{
    const ctx=getAudio();
    const notes=[523,659,784,1047];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.3);
      o.start(ctx.currentTime+i*0.12);
      o.stop(ctx.currentTime+i*0.12+0.3);
    });
  }catch(e){}
}

// PIN
let pinVal='';
function pinPress(n){
  if(pinVal.length>=4) return;
  pinVal+=n;
  document.getElementById('d'+(pinVal.length-1)).classList.add('filled');
  if(pinVal.length===4){
    if(pinVal===PIN_OK){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('splash').style.display='flex';
    } else {
      document.getElementById('pin-error').classList.add('show');
      setTimeout(()=>{
        pinVal='';
        for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
        document.getElementById('pin-error').classList.remove('show');
      },1000);
    }
  }
}
function pinDel(){
  if(!pinVal.length) return;
  document.getElementById('d'+(pinVal.length-1)).classList.remove('filled');
  pinVal=pinVal.slice(0,-1);
}

function enterApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('bnav').style.display='flex';
  init();
}

async function init(){
  const now=new Date();
  const y=now.getFullYear(),mo=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  todayStr=`${y}-${mo}-${d}`;
  const nombres=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const diaHoy=nombres[now.getDay()];
  diaActivo=DIAS.includes(diaHoy)?diaHoy:'Lunes';
  document.getElementById('hdr-date').textContent=`${diaHoy} · ${now.getDate()} de ${meses[now.getMonth()]}`;
  document.getElementById('splash-sub').textContent=`¡Hola Alonso! Hoy es ${diaHoy} 💪`;
  renderTabs();
  document.getElementById('content').innerHTML='<div class="loading">Cargando... ⏳</div>';
  await Promise.all([loadRutina(),loadCompletados()]);
  renderContent();
}

function esFds(d){return FDS.includes(d||diaActivo);}
function cc(d){return esFds(d)?'fds':'semana';}
function applyColor(){
  const c=esFds(diaActivo)?'#1565C0':'#FF7043';
  document.getElementById('app-header').style.background=c;
  document.getElementById('day-tabs').style.background=c;
}

async function loadRutina(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=rutina&headers=1`;
    const r=await fetch(url);
    const txt=await r.text();
    const j=JSON.parse(txt.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    rutina=j.table.rows.map(r=>({
      dia:r.c[0]?.v||'',turno:r.c[1]?.v||'',orden:r.c[2]?.v||0,
      hi:parseHora(r.c[3]),hf:parseHora(r.c[4]),
      tarea:r.c[5]?.v||'',emoji:r.c[6]?.v||'✅',
      estudio:r.c[7]?.v===true,
      puntos:r.c[8]?.v||1
    })).filter(r=>r.dia&&r.tarea);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="err">⚠️ Error: ${e.message}</div>`;
  }
}

async function loadCompletados(){
  const saved=JSON.parse(localStorage.getItem('comp_'+todayStr)||'[]');
  completados=new Set(saved);
  const savedPts=JSON.parse(localStorage.getItem('pts_semana')||'{}');
  puntosData=savedPts;
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=registros&headers=1`;
    const r=await fetch(url);
    const txt=await r.text();
    const j=JSON.parse(txt.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    const semana=getSemanaActual();
    puntosData={};
    completados=new Set();
    (j.table.rows||[]).forEach(row=>{
      const fecha=row.c[0]?.v||'';
      const dia=row.c[1]?.v||'';
      const tarea=row.c[2]?.v||'';
      const comp=row.c[8]?.v;
      const dm=String(fecha).match(/Date\((\d+),(\d+),(\d+)/);
      let fs='';
      if(dm) fs=dm[1]+'-'+String(parseInt(dm[2])+1).padStart(2,'0')+'-'+String(dm[3]).padStart(2,'0');
      else fs=String(fecha).substring(0,10);
      if(comp!==true) return;
      if(fs===todayStr) completados.add(tarea+'_'+dia);
      if(semana.includes(fs)){
        const t=rutina.find(r=>r.tarea===tarea&&r.dia===dia);
        const pts=t?t.puntos:1;
        puntosData[dia]=(puntosData[dia]||0)+pts;
      }
    });
    localStorage.setItem('comp_'+todayStr,JSON.stringify([...completados]));
    localStorage.setItem('pts_semana',JSON.stringify(puntosData));
  }catch(e){console.log('offline, usando localStorage');}
}

function getSemanaActual(){
  const now=new Date();
  const dow=now.getDay();
  const lunes=new Date(now);
  lunes.setDate(now.getDate()-(dow===0?6:dow-1));
  const dias=[];
  for(let i=0;i<7;i++){
    const d=new Date(lunes);
    d.setDate(lunes.getDate()+i);
    dias.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  return dias;
}

function parseHora(cell){
  if(!cell) return '';
  if(cell.f){const p=cell.f.split(':');return p.length===2?p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'):cell.f;}
  const m=String(cell.v||'').match(/Date\([^,]+,[^,]+,[^,]+,(\d+),(\d+)/);
  if(m) return m[1].padStart(2,'0')+':'+m[2].padStart(2,'0');
  return String(cell.v||'');
}

function renderTabs(){
  applyColor();
  const w=document.getElementById('day-tabs');
  w.innerHTML='';
  DIAS.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d.substring(0,3);
    if(FDS.includes(d)) b.classList.add('fds');
    if(d===diaActivo){b.classList.add('active');if(FDS.includes(d)) b.classList.add('fds');}
    b.onclick=()=>{diaActivo=d;renderTabs();renderContent();};
    w.appendChild(b);
  });
}

function renderContent(){
  applyColor();
  const ccc=cc();
  const tareas=rutina.filter(t=>t.dia===diaActivo).sort((a,b)=>a.orden-b.orden);
  const total=tareas.length;
  const hechas=tareas.filter(t=>completados.has(t.tarea+'_'+diaActivo)).length;
  const pct=total?Math.round(hechas/total*100):0;
  const ptsHoy=tareas.filter(t=>completados.has(t.tarea+'_'+diaActivo)).reduce((s,t)=>s+t.puntos,0);
  const msgs=['¡Vamos que puedes! 💪','¡Buen ritmo! 🔥','¡Ya casi! ⚡','¡Crack! 🏆'];
  const msg=pct===100?'¡Lo lograste todo! 🏆🎉':msgs[Math.min(Math.floor(pct/30),3)];

  let html=`<div class="pc">
    <span class="pl">${msg}</span>
    <div class="pb"><div class="pf ${ccc}" style="width:${pct}%"></div></div>
    <span class="pp ${ccc}">${hechas}/${total}</span>
  </div>
  <div class="pc" style="justify-content:center;gap:8px">
    <span style="font-size:13px;color:#999">⭐ Puntos hoy:</span>
    <span style="font-size:18px;font-weight:800;color:#7B1FA2">${ptsHoy}</span>
  </div>`;

  if(total===0){
    html+=`<div class="loading">Sin tareas para este día</div>`;
  } else {
    TURNOS.forEach(turno=>{
      const ts=tareas.filter(t=>t.turno===turno);
      if(!ts.length) return;
      html+=`<div class="tl ${ccc}">${TICOS[turno]}</div>`;
      ts.forEach((t,i)=>{
        const key=t.tarea+'_'+diaActivo;
        const done=completados.has(key);
        const tid=`${turno.replace('ñ','n')}_${i}`;
        html+=`<div class="tr${done?' done':''}" onclick="tap('${tid}')">
          <span class="te">${t.emoji}</span>
          <div class="ti">
            <div class="tn${done?' done':''}">${t.tarea}</div>
            <div class="tt">${t.hi} – ${t.hf}</div>
          </div>
          <span class="pts-pill">+${t.puntos}⭐</span>
          <div class="tc ${ccc}${done?' done':''}"></div>
        </div>`;
      });
    });
  }
  document.getElementById('content').innerHTML=html;
}

function renderPuntos(){
  const total=Object.values(puntosData).reduce((s,v)=>s+v,0);
  document.getElementById('pts-total').textContent=total;
  const maxPts=Math.max(...DIAS.map(d=>puntosData[d]||0),1);
  let html='';
  DIAS.forEach(d=>{
    const pts=puntosData[d]||0;
    const pct=Math.round(pts/maxPts*100);
    html+=`<div class="pts-day-row">
      <span class="pts-day-name">${d.substring(0,3)}</span>
      <div class="pts-day-bar-bg"><div class="pts-day-bar-fill" style="width:${pct}%"></div></div>
      <span class="pts-day-num">${pts}</span>
    </div>`;
  });
  document.getElementById('pts-dias').innerHTML=html;
}

function showScreen(s){
  document.getElementById('app').style.display=s==='rutina'?'block':'none';
  document.getElementById('puntos-screen').style.display=s==='puntos'?'block':'none';
  document.getElementById('nav-rutina').classList.toggle('active',s==='rutina');
  document.getElementById('nav-puntos').classList.toggle('active',s==='puntos');
  if(s==='puntos') renderPuntos();
}

function tap(tid){
  const parts=tid.split('_');
  const turnoRaw=parts[0],idx=parseInt(parts[1]);
  const turno=turnoRaw==='manana'?'mañana':turnoRaw;
  const ts=rutina.filter(t=>t.dia===diaActivo&&t.turno===turno).sort((a,b)=>a.orden-b.orden);
  const t=ts[idx];
  if(!t) return;
  const key=t.tarea+'_'+diaActivo;
  if(completados.has(key)){showToast('Ya está completada ✅');return;}
  if(t.estudio){pendingTask=t;openModal();}
  else{marcarTarea(t,'','','');}
}

function openModal(){
  document.getElementById('m-mat').value='';
  document.getElementById('m-min').value='';
  document.getElementById('m-quien').value='solo';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){
  pendingTask=null;
  document.getElementById('modal-bg').classList.remove('open');
}
function confirmEstudio(){
  const mat=document.getElementById('m-mat').value.trim();
  const min=document.getElementById('m-min').value.trim();
  const quien=document.getElementById('m-quien').value;
  if(!mat){showToast('Escribe la materia 📝');return;}
  if(!min||Number(min)<1){showToast('Escribe los minutos ⏱');return;}
  closeModal();
  marcarTarea(pendingTask,quien,mat,min);
  pendingTask=null;
}

async function marcarTarea(t,quien,materia,minutos){
  const key=t.tarea+'_'+diaActivo;
  completados.add(key);
  puntosData[diaActivo]=(puntosData[diaActivo]||0)+t.puntos;
  localStorage.setItem('comp_'+todayStr,JSON.stringify([...completados]));
  localStorage.setItem('pts_semana',JSON.stringify(puntosData));
  playCheck();
  renderContent();

  // Comprobar si día completo
  const tareasDia=rutina.filter(t=>t.dia===diaActivo);
  const todasHechas=tareasDia.every(t=>completados.has(t.tarea+'_'+diaActivo));
  if(todasHechas){
    setTimeout(()=>{
      playCelebration();
      showCelebration(puntosData[diaActivo]||0);
    },400);
  }

  const now=new Date();
  const hora=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const fila=[todayStr,diaActivo,t.tarea,t.turno,hora,quien,materia,String(minutos),'TRUE'];
  try{
    await fetch(SURL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({fila})});
  }catch(e){console.error(e);}
}

function showCelebration(pts){
  document.getElementById('cel-emoji').textContent='🏆';
  document.getElementById('cel-title').textContent='¡Día completado!';
  document.getElementById('cel-sub').textContent=`¡Lo has conseguido, Alonso! 🎉`;
  document.getElementById('cel-pts').textContent=`+${pts} ⭐ hoy`;
  document.getElementById('celebration').classList.add('show');
}
function closeCelebration(){
  document.getElementById('celebration').classList.remove('show');
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}

document.getElementById('modal-bg').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
</script>
</body>
</html>
